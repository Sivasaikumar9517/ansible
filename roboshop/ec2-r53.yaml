- name: create ec2 and R53 records
  hosts: local
  connection: local
  become: yes
  vars:
    ami_id: ami-0220d79f3f480ecf5
    sg_id: sg-08bc0fad006eb3766 # replace with your SG ID
    zone_id: "Z0948150OFPSYTNVYZOY" # replace with your ID
    domain_name: "daws86s.fun"
    instances:
    - mongodb
    - redis
  tasks:
  - name: Create a ec2 instances
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      instance_type: t3.micro
      region: us-east-1
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      tags:
        Name: "{{ item }}"
    loop: "{{ instances }}"
    register: ec2_output

